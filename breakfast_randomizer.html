<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Завтрак</title>
<style>
  :root{
    --bg:#fffafc;
    --panel:#fff2f7;
    --panel2:#ffe9f2;
    --edge:#ffdcea;
    --edge-strong:#ffc4dd;
    --ink:#3a2530;
    --ink-soft:#8a6f7c;
    --pink:#ff9ec6;
    --pink-deep:#f57bad;
    --mint:#b6ddce;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:transparent}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
    color:var(--ink);
    padding:18px;
    display:flex;justify-content:center;
  }
  .card{
    width:100%;max-width:440px;
    background:var(--bg);
    border:1.5px solid var(--edge-strong);
    border-radius:26px;
    padding:24px 20px 26px;
    box-shadow:0 8px 30px rgba(255,158,198,.16);
  }
  .head{text-align:center;margin-bottom:20px}
  .head h1{
    font-size:22px;font-weight:800;letter-spacing:.02em;
    color:var(--ink);
  }

  .base{
    font-size:12.5px;color:var(--ink-soft);line-height:1.55;
    margin-bottom:18px;padding:12px 15px;
    background:var(--panel);border-radius:16px;border:1.5px solid var(--edge);
  }
  .base b{color:var(--ink);font-weight:700}

  .slot{
    background:var(--panel);
    border:1.5px solid var(--edge);
    border-radius:18px;
    padding:14px 15px;
    margin-bottom:12px;
    display:flex;align-items:center;gap:13px;
  }
  .slot .label{
    font-size:11px;font-weight:700;letter-spacing:.05em;
    color:var(--pink-deep);width:70px;flex-shrink:0;
  }
  .slot .val{
    flex:1;font-size:16px;font-weight:600;color:var(--ink);line-height:1.3;
    min-height:22px;
  }
  .slot .val.empty{color:var(--edge-strong);font-weight:600}
  .roll{
    flex-shrink:0;width:42px;height:42px;border-radius:50%;
    border:1.5px solid var(--edge-strong);background:#fff;
    color:var(--pink-deep);font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:transform .2s ease,background .15s ease;
  }
  .roll:hover{background:var(--panel2)}
  .roll:active{transform:rotate(-25deg) scale(.88)}

  .special{margin-top:16px;padding-top:16px;border-top:1.5px dashed var(--edge)}
  .special .slot{border-color:var(--mint);background:#f4faf7}
  .special .label{color:#6aae95}
  .special .roll{color:#6aae95;border-color:var(--mint)}
  .special .roll:hover{background:#e8f5f0}

  .all{
    margin-top:20px;width:100%;padding:15px;
    border:none;border-radius:18px;cursor:pointer;
    background:var(--pink);color:#fff;
    font-family:inherit;font-size:15px;font-weight:800;
    letter-spacing:.03em;
    box-shadow:0 4px 14px rgba(245,123,173,.28);
    transition:background .15s,transform .1s;
  }
  .all:hover{background:var(--pink-deep)}
  .all:active{transform:translateY(1px)}

  @media (prefers-reduced-motion:reduce){
    .roll,.all{transition:none}
    .roll:active{transform:none}
  }
</style>
</head>
<body>
<div class="card">
  <div class="head">
    <h1>Завтрак</h1>
  </div>

  <div class="base">
    База: <b>2 бутерброда на зерновом хлебе</b>. №1 — начинка + <b>сыр</b> (на полкуска). №2 — начинка ниже.
  </div>

  <div class="slot">
    <span class="label">Начинка</span>
    <span class="val empty" id="protein">—</span>
    <button class="roll" onclick="roll('protein')" aria-label="Крутить начинку">⟳</button>
  </div>

  <div class="slot">
    <span class="label">Side</span>
    <span class="val empty" id="side">—</span>
    <button class="roll" onclick="roll('side')" aria-label="Крутить side">⟳</button>
  </div>

  <div class="special">
    <div class="slot">
      <span class="label">Особое</span>
      <span class="val empty" id="special">—</span>
      <button class="roll" onclick="roll('special')" aria-label="Крутить особое">⟳</button>
    </div>
  </div>

  <button class="all" onclick="rollAll()">Собрать заново</button>
</div>

<script>
  const DATA = {
    protein: [
      "Куриная ветчина + огурец 🥒",
      "Индейка Maxi 🦃",
      "Свинина Maxi + огурец 🥒",
      "Паштет 🫙",
      "Куриная ветчина 🐔"
    ],
    side: [
      "Клубника 🍓","Черника 🫐","Малина ♡","Голубика 🫐",
      "Мандарин 🍊","Апельсин 🍊","Грейпфрут 🍊",
      "Яблоко 🍎","Груша 🍐","Киви 🥝","Банан 🍌","Виноград 🍇","Слива 🟣","Персик 🍑",
      "Морковь палочками 🥕",
      "Курага ☀️","Чернослив ♡","Финики 🌴","Изюм ♡",
      "Сок апельсиновый 🧃","Сок яблочный 🧃","Смузи 🥤",
      "1 печенье 🍪","Мармелад 🍬","Пара фиников 🌴","Квадратик шоколада 🍫"
    ],
    special: [
      "Смузи-боул на греч. йогурте + банан 🥣",
      "Яйцо + тост 🍳",
      "Творог + банан 🍌",
      "Онигиразу 🍙 (~750к / 27б)",
      "Overnight oats кокос-манго 🥥 (~600к / 13б)"
    ]
  };

  function pick(key){
    const arr = DATA[key];
    const el = document.getElementById(key);
    const prev = el.textContent;
    let next = prev;
    if(arr.length > 1){
      do { next = arr[Math.floor(Math.random()*arr.length)]; }
      while(next === prev);
    } else { next = arr[0]; }
    return next;
  }

  function roll(key){
    const el = document.getElementById(key);
    el.classList.remove('empty');
    el.textContent = pick(key);
  }

  function rollAll(){
    roll('protein');
    roll('side');
  }
</script>
</body>
</html>
